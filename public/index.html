<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Herd Mentality</title>
<style>
  :root { --bg:#0f1226; --card:#1b1f3b; --ink:#f4f1e8; --moo:#ff7eb6; --grass:#7bd88f; --line:#33386b; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; }
  .wrap { max-width:760px; margin:0 auto; padding:20px 16px 40px; }
  h1 { font-size:clamp(28px,7vw,48px); margin:.2em 0; letter-spacing:.5px; }
  h1 .moo { color:var(--moo); }
  .sub { opacity:.7; margin-bottom:24px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px; margin:14px 0; }
  button { font:inherit; font-weight:600; border:0; border-radius:12px; padding:14px 20px; background:var(--moo); color:#2a0d1c; cursor:pointer; width:100%; margin-top:8px; }
  button.ghost { background:transparent; color:var(--ink); border:1px solid var(--line); }
  button:active { transform:translateY(1px); }
  button:disabled { opacity:.4; cursor:not-allowed; }
  button.merge { background:transparent; color:var(--grass); border:1.5px solid var(--grass); }
  .tabs { display:flex; gap:8px; margin-bottom:14px; }
  .tabs button { flex:1; margin:0; }
  input { font:inherit; width:100%; padding:14px 16px; border-radius:12px; border:1px solid var(--line); background:#0d1030; color:var(--ink); margin-top:8px; text-transform:none; }
  .code { font-size:clamp(40px,14vw,84px); font-weight:800; letter-spacing:.18em; color:var(--grass); text-align:center; margin:8px 0; }
  .q { font-size:clamp(22px,5.5vw,34px); font-weight:700; line-height:1.25; }
  .pill { display:inline-block; padding:4px 12px; border-radius:999px; background:#0d1030; border:1px solid var(--line); font-size:14px; margin:3px 4px 0 0; }
  .row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line); position:relative; border-radius:8px; }
  @keyframes pulseGreen { from { background:rgba(123,216,143,.22); } to { background:transparent; } }
  .row.gain { animation: pulseGreen 1.1s cubic-bezier(.22,1,.36,1); }
  @keyframes floatUp { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-20px); } }
  .plusone { position:absolute; right:48px; top:7px; color:var(--grass); font-weight:800; pointer-events:none; animation: floatUp 1s ease-out forwards; }
  @keyframes cardIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .anim-in { animation: cardIn .3s cubic-bezier(.22,1,.36,1) both; }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation:none !important; transition:none !important; } }
  .row:last-child { border-bottom:0; }
  .row .name { flex:1; }
  .score { font-weight:800; font-size:20px; }
  .cow { font-size:20px; }
  .grp { padding:10px 0; border-bottom:1px solid var(--line); }
  .grp b { color:var(--grass); }
  .grp.maj b { color:var(--moo); }
  .merge-card { cursor:pointer; border-radius:10px; padding-left:8px; transition:outline .1s; }
  .merge-card.sel { outline:2px solid var(--moo); background:#0d1030; }
  .muted { opacity:.6; }
  .big { font-size:clamp(30px,8vw,52px); font-weight:800; color:var(--moo); text-align:center; }
  .center { text-align:center; }
  .err { color:#ff8a8a; min-height:1.2em; }
  .tick { color:var(--grass); }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script src="/confetti.js"></script>
<script>
const app = document.getElementById("app");
let ws, state = null, role = null, selected = new Set(), resuming = false;
const SKEY = "herd"; // localStorage key for the active session
const saveSession = (s) => { try { localStorage.setItem(SKEY, JSON.stringify(s)); } catch {} };
const loadSession = () => { try { return JSON.parse(localStorage.getItem(SKEY)); } catch { return null; } };
const clearSession = () => { try { localStorage.removeItem(SKEY); } catch {} };

function connect(then) {
  ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host);
  ws.onopen = then;
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if (m.t === "error") {
      if (m.resume) { clearSession(); resuming = false; landing("join", "Your previous game has ended — start a new one or join with a code."); } // dead/expired session -> gentle return to landing
      else renderError(m.msg);
      return;
    }
    if (m.t === "state") {
      resuming = false;
      state = m; role = m.role;
      if (m.token) saveSession({ code: m.code, token: m.token }); // remember who we are, so a refresh reconnects
      render();
    }
  };
  ws.onclose = () => { if (!resuming) app.innerHTML = '<div class="card center">Disconnected. <a href="/" style="color:var(--moo)">Reload</a> to reconnect.</div>'; };
}
const sendMsg = (o) => ws.send(JSON.stringify(o));
function leaveGame() { clearSession(); try { sendMsg({ t: "leave" }); ws.close(); } catch {} state = null; role = null; landing(); }

// ---------- landing ----------
let landName = ""; // keep the typed name when switching tabs
function landing(tab = "join", notice = "") {
  const join = tab === "join";
  app.innerHTML = `
    <h1>Herd <span class="moo">Mentality</span> 🐄</h1>
    <p class="sub">Everyone answers the same question — match the herd to score. Be the odd one out and you’re stuck with the Pink Cow.</p>
    ${notice ? `<div class="card center muted">${esc(notice)}</div>` : ""}
    <div class="tabs">
      <button id="tabJoin" class="${join ? "" : "ghost"}">Join a game</button>
      <button id="tabCreate" class="${join ? "ghost" : ""}">Create a game</button>
    </div>
    <div class="card">
      <input id="name" placeholder="Your name" maxlength="20" autocomplete="off" />
      ${join ? `<input id="code" placeholder="Room code" maxlength="4" autocomplete="off" style="text-transform:uppercase" />` : ""}
      <p class="err" id="err"></p>
      <button id="go">${join ? "Join game" : "Create game"}</button>
    </div>`;
  const nameEl = document.getElementById("name");
  nameEl.value = landName;
  const switchTo = (t) => { landName = nameEl.value; landing(t); };
  document.getElementById("tabJoin").onclick = () => switchTo("join");
  document.getElementById("tabCreate").onclick = () => switchTo("create");
  document.getElementById("go").onclick = () => {
    const name = nameEl.value.trim();
    if (!name) return renderError("Enter your name first.");
    if (join) {
      const code = document.getElementById("code").value.trim().toUpperCase();
      if (code.length !== 4) return renderError("Code is 4 letters.");
      connect(() => sendMsg({ t: "join", name, code }));
    } else {
      connect(() => sendMsg({ t: "create", name }));
    }
  };
}
function renderError(msg) { const e = document.getElementById("err"); if (e) e.textContent = msg; }

// ---------- render dispatch ----------
function render() {
  if (!state) return;
  if (state.phase !== "review") selected.clear(); // drop stale selections between rounds
  if (state.phase === "lobby") { prevScores = {}; prevCowHolder = null; confettiFired = false; prevRank = {}; } // fresh game
  const s = state, lead = s.isLeader;
  const phaseChanged = lastPhase !== s.phase; // drives crossfade + one-time stagger
  const head = `<h1>Herd <span class="moo">Mentality</span> 🐄</h1>
    <div class="card center"><b>${s.youEmoji} ${esc(s.you)}</b>${lead ? " 👑" : ""} · ${s.score} pt${s.score === 1 ? "" : "s"} ${s.cow ? "· 🐄 Pink Cow" : ""}<br><span class="muted">Room ${s.code}</span> · <a href="#" id="leave" style="color:var(--moo)">Leave</a></div>`;
  let body = "";

  if (s.phase === "lobby") {
    body = `<div class="card center">
        <p class="muted">Share this code so friends can join:</p>
        <div class="code">${s.code}</div>
        <div>${s.players.map(p => `<span class="pill">${p.emoji} ${esc(p.name)}</span>`).join("")}</div>
      </div>` +
      (lead ? `<button id="start">Start game</button>`
            : `<div class="card center muted">Waiting for the host to start…</div>`);

  } else if (s.phase === "asking") {
    const allIn = s.answeredCount >= s.total;
    const waitMsg = allIn
      ? (lead ? "Everyone’s in — hit Reveal 👇" : "Everyone’s in — waiting for the host to reveal…")
      : `${s.answeredCount} / ${s.total} answered…`;
    body = s.answered
      ? `<div class="card"><div class="q">${esc(s.question)}</div></div>
         <div class="card center tick">Answer locked in ✅<br><span class="muted">${waitMsg}</span></div>`
      : `<div class="card"><div class="q">${esc(s.question)}</div>
         <input id="ans" placeholder="Your answer" maxlength="60" autocomplete="off" />
         <button id="submit">Submit</button></div>`;
    if (lead) body += `<div class="card"><p class="muted">${s.answeredCount} / ${s.total} answered</p>
        <div>${s.players.map(p => `<span class="pill">${p.emoji} ${esc(p.name)}${p.answered ? " ✅" : ""}</span>`).join("")}</div></div>
      <button id="reveal" ${s.answeredCount < 1 ? "disabled" : ""}>Reveal answers</button>
      <button class="ghost" id="skip">Skip this question</button>`;

  } else if (s.phase === "review") {
    const cards = s.review.map((b, i) => {
      const anim = phaseChanged ? "anim-in" : "";                       // cascade only when review first opens
      const delay = phaseChanged ? `style="animation-delay:${i * 45}ms"` : "";
      const inner = `<b>${esc(b.label)}</b> <span class="muted">×${b.count}</span><br><span class="muted">${b.names.map(esc).join(", ")}</span>`;
      return lead
        ? `<div class="grp merge-card ${selected.has(b.id) ? "sel" : ""} ${anim}" data-id="${b.id}" ${delay}>${inner}</div>`
        : `<div class="grp ${anim}" ${delay}>${inner}</div>`;
    }).join("");
    body = `<div class="card"><div class="q">${esc(s.question)}</div></div>
      <div class="card">${cards}</div>`;
    body += lead
      ? `${selected.size >= 2 ? `<button class="merge" id="mergeSel">Merge ${selected.size} answers</button>` : ""}
         <button id="score">Score this round</button>
         <button class="ghost" id="regroup">Reset groups</button>`
      : `<div class="card center muted">Discuss! The host will merge any duplicates, then score.</div>`;

  } else if (s.phase === "reveal" || s.phase === "won") {
    // answers were already seen in review; just show the herd answer + scores
    const herd = s.reveal && s.reveal.majority.length
      ? `<div class="card center">Herd answer: <b style="color:var(--moo)">${s.reveal.majority.map(esc).join(", ")}</b></div>`
      : `<div class="card center muted">No agreement — nobody scored this round.</div>`;
    body = herd + scoreCard(s);
    if (s.phase === "won") body += `<div class="card center"><div class="big">🏆 ${esc(s.winner)} wins!</div></div>` + (lead ? `<button id="restart">New game</button>` : "");
    else body += lead ? `<button id="next">Next question</button>` : `<div class="card center muted">Waiting for the next question…</div>`;
  }

  // preserve an in-progress answer across re-renders (others answering shouldn't wipe your input)
  const prev = document.getElementById("ans");
  const draft = prev ? prev.value : null;
  const wasFocused = prev && document.activeElement === prev;

  app.innerHTML = head + body;

  // answer box
  const submit = document.getElementById("submit");
  if (submit) {
    const inp = document.getElementById("ans");
    if (draft !== null) inp.value = draft; // keep what they were typing
    const go = () => { const text = inp.value.trim(); if (text) sendMsg({ t: "answer", text }); };
    submit.onclick = go;
    inp.addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });
    if (wasFocused || draft === null) { inp.focus(); const n = inp.value.length; inp.setSelectionRange(n, n); } // focus on first show or if they were typing; don't steal otherwise
  }
  // leader controls
  bind("start", { t: "start" }); bind("reveal", { t: "reveal" });
  bind("next", { t: "next" }); bind("restart", { t: "restart" }); bind("score", { t: "score" }); bind("skip", { t: "skip" });
  const leaveEl = document.getElementById("leave");
  if (leaveEl) leaveEl.onclick = (e) => { e.preventDefault(); leaveGame(); };
  const regroup = document.getElementById("regroup");
  if (regroup) regroup.onclick = () => { selected.clear(); sendMsg({ t: "regroup" }); };
  const mergeSel = document.getElementById("mergeSel");
  if (mergeSel) mergeSel.onclick = () => { sendMsg({ t: "merge", ids: [...selected] }); selected.clear(); };
  document.querySelectorAll(".merge-card").forEach((el) => {
    el.onclick = () => {
      const id = Number(el.dataset.id);
      selected.has(id) ? selected.delete(id) : selected.add(id); // toggle
      render();
    };
  });

  if (phaseChanged && app.animate) app.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 180, easing: "ease-out" }); // gentle crossfade between phases
  if (s.phase === "reveal" || s.phase === "won") { flipScoreboard(s); juice(s); } // Tier 2 re-sort, then Tier 1 juice
  lastPhase = s.phase;
}

// Tier 2: glide scoreboard rows to their new rank (FLIP via cached indices + row height).
function flipScoreboard(s) {
  const rows = [...document.querySelectorAll(".row")];
  const h = rows[0] ? rows[0].offsetHeight : 0;
  if (h && rows[0].animate) {
    rows.forEach((row, newIdx) => {
      const oldIdx = prevRank[row.dataset.name];
      if (oldIdx != null && oldIdx !== newIdx) {
        row.animate([{ transform: `translateY(${(oldIdx - newIdx) * h}px)` }, { transform: "translateY(0)" }], { duration: 380, easing: "cubic-bezier(.22,1,.36,1)" });
      }
    });
  }
  prevRank = Object.fromEntries(s.scoreboard.map((p, i) => [p.name, i]));
}

// ---------- juice (Tier 1: score count-up + gainer pulse, pink-cow slide, win confetti) ----------
let prevScores = {}, prevCowHolder = null, confettiFired = false, prevRank = {}, lastPhase = null;
function juice(s) {
  const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const rows = [...document.querySelectorAll(".row")];
  const rowByName = (n) => rows.find((r) => r.dataset.name === n);
  const newCowHolder = (s.scoreboard.find((p) => p.cow) || {}).name || null;

  if (!reduce) {
    for (const p of s.scoreboard) { // count up + highlight whoever gained
      const prev = prevScores[p.name] ?? 0;
      if (p.score > prev) {
        const row = rowByName(p.name);
        if (row) {
          row.classList.add("gain");
          const plus = document.createElement("span");
          plus.className = "plusone"; plus.textContent = `+${p.score - prev}`;
          row.appendChild(plus);
          setTimeout(() => plus.remove(), 1000);
          const sc = row.querySelector(".score");
          if (sc) countUp(sc, prev, p.score);
        }
      }
    }
    if (newCowHolder && prevCowHolder && newCowHolder !== prevCowHolder) { // pink cow changes hands
      const from = rowByName(prevCowHolder), to = rowByName(newCowHolder);
      if (from && to) flyCow(from, to);
    }
    if (s.phase === "won" && !confettiFired && window.confetti) { confettiFired = true; popConfetti(); }
  }
  prevScores = Object.fromEntries(s.scoreboard.map((p) => [p.name, p.score]));
  prevCowHolder = newCowHolder;
}
function countUp(el, from, to) {
  if (typeof requestAnimationFrame !== "function" || typeof performance === "undefined") { el.textContent = to; return; }
  const dur = 480, t0 = performance.now();
  const step = (t) => { const k = Math.min(1, (t - t0) / dur); el.textContent = Math.round(from + (to - from) * (1 - Math.pow(1 - k, 3))); if (k < 1) requestAnimationFrame(step); else el.textContent = to; };
  requestAnimationFrame(step);
}
function flyCow(from, to) {
  const a = from.getBoundingClientRect(), b = to.getBoundingClientRect();
  if (!a.width || !b.width) return; // no layout (headless) -> skip silently
  const cell = to.querySelector(".cow");
  const fly = document.createElement("div");
  fly.textContent = "🐄";
  fly.style.cssText = "position:fixed;left:0;top:0;font-size:22px;z-index:60;pointer-events:none;will-change:transform";
  document.body.appendChild(fly);
  const sx = a.right - 46, sy = a.top + a.height / 2 - 12, ex = b.right - 46, ey = b.top + b.height / 2 - 12;
  if (!fly.animate) { fly.remove(); return; }
  if (cell) cell.style.visibility = "hidden"; // hide the destination cow until it lands
  const anim = fly.animate([
    { transform: `translate(${sx}px,${sy}px) rotate(0deg)` },
    { transform: `translate(${(sx + ex) / 2}px,${Math.min(sy, ey) - 36}px) rotate(-12deg)`, offset: .5 },
    { transform: `translate(${ex}px,${ey}px) rotate(0deg)` },
  ], { duration: 700, easing: "cubic-bezier(.22,1,.36,1)" });
  anim.onfinish = () => { fly.remove(); if (cell) cell.style.visibility = ""; };
}
function popConfetti() {
  const colors = ["#ff7eb6", "#7bd88f", "#f4f1e8"];
  const end = (typeof performance !== "undefined" ? performance.now() : 0) + 900;
  (function frame() {
    confetti({ particleCount: 5, spread: 65, startVelocity: 46, origin: { x: Math.random(), y: -0.1 }, colors });
    if (typeof performance !== "undefined" && performance.now() < end) requestAnimationFrame(frame);
  })();
}

// ---------- shared blocks ----------
function scoreCard(s) {
  return `<div class="card"><h3>Scores</h3>${s.scoreboard.map(p => `
    <div class="row" data-name="${esc(p.name)}"><span class="name">${p.emoji} ${esc(p.name)}</span>
      <span class="cow">${p.cow ? "🐄" : ""}</span>
      <span class="score">${p.score}</span></div>`).join("")}
    <p class="muted center" style="margin-top:10px">First to 8 wins — but not while holding the cow.</p></div>`;
}
function bind(id, msg) { const el = document.getElementById(id); if (el) el.onclick = () => sendMsg(msg); }
function esc(s) { return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

// boot: if we have a saved session, try to walk straight back into the game
const saved = loadSession();
if (saved && saved.code && saved.token) { resuming = true; connect(() => sendMsg({ t: "resume", code: saved.code, token: saved.token })); }
else landing();
</script>
</body>
</html>
